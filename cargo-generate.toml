# cargo-generate template configuration.
#
# When users run `cargo generate --git <this-repo>`, the prompts below are
# asked interactively and the answers substituted into file contents and
# paths via Liquid templating (`{{ placeholder }}`).
#
# See: https://cargo-generate.github.io/cargo-generate/

[template]
cargo_generate_version = ">=0.21.0"

[hooks]
post = ["scripts/post-script.rhai"]

# ── Prompts ────────────────────────────────────────────────────────────────
# All placeholders are top-level (always defined) even when the user opts
# out of the related feature. That guarantees path templates like
# `crates/{{mcp_crate_name}}` always render to a non-empty path that the
# `[conditional.*]` `ignore` rules below can match and remove.

[placeholders.project_name]
type = "string"
prompt = "Workspace / GitHub repo name (kebab-case)"
regex = "^[a-z][a-z0-9_-]*$"

[placeholders.project_description]
type = "string"
prompt = "One-line description of the project"
default = "A Rust workspace."

[placeholders.author_name]
type = "string"
prompt = "Author name (used in Cargo.toml authors and copyright headers)"
default = "Your Name"

[placeholders.github_owner]
type = "string"
prompt = "GitHub owner or organisation (used in repo URLs)"
regex = "^[A-Za-z0-9][A-Za-z0-9-]*$"

[placeholders.license_year]
type = "string"
prompt = "Copyright year"
default = "2026"
regex = "^[0-9]{4}$"

[placeholders.core_crate_name]
type = "string"
prompt = "Name of the core library crate (lowercase, hyphens ok)"
default = "core"
regex = "^[a-z][a-z0-9_-]*$"

[placeholders.include_mcp]
type = "bool"
prompt = "Include an MCP (Model Context Protocol) server crate?"
default = true

[placeholders.mcp_crate_name]
type = "string"
prompt = "MCP server crate name (only used if you include MCP)"
default = "mcp"
regex = "^[a-z][a-z0-9_-]*$"

[placeholders.include_vscode_extension]
type = "bool"
prompt = "Bundle the MCP server in a VS Code extension? (requires include_mcp)"
default = true

[placeholders.vscode_publisher]
type = "string"
prompt = "VS Code Marketplace publisher id (only used if extension is included)"
default = "your-publisher-id"

[placeholders.vscode_extension_display_name]
type = "string"
prompt = "VS Code extension display name (only used if extension is included)"
default = "My MCP Server"

[placeholders.include_release_please]
type = "bool"
prompt = "Include release-please + auto-publish GitHub Actions workflows?"
default = true

# ── Conditional file removal ───────────────────────────────────────────────
# `ignore` paths are evaluated AFTER Liquid substitution in paths, so they
# reference the rendered names.

[conditional.'!include_mcp']
ignore = ["crates/{{mcp_crate_name}}"]

[conditional.'!include_vscode_extension']
ignore = [
    "crates/{{mcp_crate_name}}/extension",
    ".github/workflows/build-extension.yml",
    ".github/workflows/publish-extension.yml",
]

[conditional.'!include_release_please']
ignore = [
    "release-please-config.json",
    ".release-please-manifest.json",
    ".github/workflows/release-please.yml",
]
