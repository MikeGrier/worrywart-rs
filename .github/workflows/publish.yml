name: publish

# Triggered automatically when a v* tag is pushed (typically by
# release-please after the Release PR is merged).
# Can also be triggered manually from the Actions tab to publish a tag
# that was created before this workflow existed.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # worrywart-client has no dependency on worrywart, so either order
      # works, but publishing the client first is slightly safer.
      - name: publish worrywart-client
        run: cargo publish --package worrywart-client --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Small delay so crates.io has time to index the client before we
      # publish worrywart (which doesn't depend on the client, but belt-
      # and-suspenders for future versions that might).
      - name: wait for index propagation
        run: sleep 10

      - name: publish worrywart
        run: cargo publish --package worrywart --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
