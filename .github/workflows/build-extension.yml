name: build-extension

# Build per-platform VSIXes for the {{mcp_crate_name}} VS Code extension on every
# push and PR. This workflow does NOT publish; publishing happens in
# `publish-extension.yml` which is gated behind a required-reviewer
# environment and only fires on `v*` tags.

on:
  push:
    branches: [main]
    paths:
      - "crates/{{mcp_crate_name}}/**"
      - "crates/{{core_crate_name}}/**"
      - ".github/workflows/build-extension.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "crates/{{mcp_crate_name}}/**"
      - "crates/{{core_crate_name}}/**"
      - ".github/workflows/build-extension.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package:
    name: package (${{ matrix.vscode_target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - vscode_target: win32-x64
            rust_target: x86_64-pc-windows-msvc
          - vscode_target: win32-arm64
            rust_target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain (${{ matrix.rust_target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust_target }}

      - name: cargo build --release {{mcp_crate_name}}
        run: cargo build --release -p {{mcp_crate_name}} --target ${{ matrix.rust_target }} --locked

      - name: cargo test {{mcp_crate_name}} (host arch only)
        if: matrix.rust_target == 'x86_64-pc-windows-msvc'
        run: cargo test -p {{mcp_crate_name}} --target ${{ matrix.rust_target }} --locked

      - name: Read workspace version
        id: workspace-version
        uses: ./.github/actions/workspace-version

      - name: Verify package.json version matches workspace version
        shell: pwsh
        run: |
          $pkg = Get-Content -Raw crates/{{mcp_crate_name}}/extension/package.json | ConvertFrom-Json
          $pkgVer = $pkg.version
          $wsVer = "${{ steps.workspace-version.outputs.version }}"
          if ($pkgVer -ne $wsVer) {
              Write-Error "package.json version '$pkgVer' does not match workspace version '$wsVer'."
              exit 1
          }
          Write-Host "package.json version OK: $pkgVer"

      - name: Stage binary into extension/bin/
        shell: pwsh
        run: |
          $src = "target/${{ matrix.rust_target }}/release/{{mcp_crate_name}}.exe"
          $dst = "crates/{{mcp_crate_name}}/extension/bin/{{mcp_crate_name}}.exe"
          New-Item -ItemType Directory -Force -Path (Split-Path $dst) | Out-Null
          Copy-Item $src $dst -Force
          $ver = "${{ steps.workspace-version.outputs.version }}"
          Set-Content -NoNewline -Encoding ascii `
              -Path crates/{{mcp_crate_name}}/extension/bin/VERSION -Value $ver
          "Staged {{mcp_crate_name}} $ver for ${{ matrix.vscode_target }}"
          Get-ChildItem crates/{{mcp_crate_name}}/extension/bin

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: npm ci (extension)
        working-directory: crates/{{mcp_crate_name}}/extension
        run: npm ci --no-audit --no-fund

      - name: Compile TypeScript
        working-directory: crates/{{mcp_crate_name}}/extension
        run: npm run compile

      - name: vsce package --target ${{ matrix.vscode_target }}
        working-directory: crates/{{mcp_crate_name}}/extension
        run: npx vsce package --target ${{ matrix.vscode_target }} --no-dependencies

      - name: Verify VSIX was produced
        shell: pwsh
        working-directory: crates/{{mcp_crate_name}}/extension
        run: |
          $vsix = Get-ChildItem -Filter "*.vsix" | Select-Object -First 1
          if (-not $vsix) { throw "No .vsix produced" }
          "Built: $($vsix.Name) ($([math]::Round($vsix.Length / 1KB, 1)) KB)"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: {{mcp_crate_name}}-${{ matrix.vscode_target }}
          path: crates/{{mcp_crate_name}}/extension/*.vsix
          if-no-files-found: error
          retention-days: 30
