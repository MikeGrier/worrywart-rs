name: release-please

# Creates or updates a "Release PR" on every push to main.
# When the Release PR is merged it creates the tag + GitHub Release.
#
# Commit message conventions that drive version bumps:
#   fix: ...             -> patch  (0.1.2 -> 0.1.3)
#   feat: ...            -> minor  (0.1.2 -> 0.2.0)
#   feat!: ...           -> major  (0.1.2 -> 1.0.0)
#   BREAKING CHANGE: ... -> major  (in the commit footer)
#
# What the Release PR updates automatically:
#   - [workspace.package].version in Cargo.toml
#   - Cargo.lock (updated by the `update-lockfile` job below)
#   - CHANGELOG.md
#
# After merging the Release PR the tag v{version} is created.
# Publish to crates.io is done manually after the tag is created.

on:
  push:
    branches: [main]

# Serialize all runs so the `update-lockfile` job never races against a
# concurrent run trying to push to the same release-PR branch.
# `cancel-in-progress: false` lets an in-flight run finish; the next
# queued run will then see a fully up-to-date release branch.
concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # IMPORTANT: must be a PAT (personal access token) with `repo`
          # scope, NOT `secrets.GITHUB_TOKEN`. GitHub suppresses workflow
          # triggers for events (tags, pushes) created by GITHUB_TOKEN, so
          # the v* tag that release-please creates on merge would never start
          # publish-extension.yml. Store a PAT as the
          # `RELEASE_PLEASE_TOKEN` repository secret to enable those flows.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # After release-please creates or updates the Release PR, run
  # `cargo check --workspace` (without --locked) so that Cargo.lock is
  # regenerated to reflect the new [workspace.package].version. Without
  # this step the CI on the Release PR would fail because Cargo.lock would
  # still reference the old workspace-member versions.
  update-lockfile:
    name: update Cargo.lock on release PR
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.pr != '' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
          # Use the same PAT so the committed Cargo.lock push is associated
          # with the non-bot identity, ensuring CI triggers on the new commit.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Update Cargo.lock for version bump
        # Running without --locked lets cargo update the workspace-member
        # entries to match the new version while preserving
        # the locked versions of all external dependencies.
        run: cargo check --workspace

      - name: Commit updated Cargo.lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git diff --staged --quiet || git commit -m "chore: update Cargo.lock for version bump"
          git push
